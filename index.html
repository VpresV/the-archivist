<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Archivist</title>
    <link rel="stylesheet" href="css/style.css" />
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9404456671845778"
     crossorigin="anonymous"></script>
  </head>
  <body>

    <div id="game-container">
      <h1 id="game-title">The Archivist</h1>
      <p id="knowledge-display">Knowledge: <span id="knowledge-count">0</span></p>
      <button id="click-btn">Recover a Fragment</button>
      <p id="per-second">Fragments per second: <span id="fps">0</span></p>
    </div>

    <script src="js/game.js"></script>

    <!-- Ko-fi supporter button -->
    <script src='https://storage.ko-fi.com/cdn/scripts/overlay-widget.js'></script>
    <script>
        kofiWidgetOverlay.draw('thearchivistgame', {
            'type': 'floating-chat',
            'floating-chat.donateButton.text': 'Support the Archive',
            'floating-chat.donateButton.background-color': '#2d1a00',
            'floating-chat.donateButton.text-color': '#e8c87a'
        });
    </script>
  </body>
</html>
